board = esp32doit-devkit-v1
framework = arduino
lib_deps =
	olikraus/U8g2@^2.35.30
	ricmoo/QRCode@^0.0.1
	knolleary/PubSubClient@^2.8.0
	adafruit/RTClib@^2.1.4
